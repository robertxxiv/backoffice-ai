name: backoffice-ai

services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-mock}
      GENERATION_PROVIDER: ${GENERATION_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      GENERATION_MODEL: ${GENERATION_MODEL:-gpt-5-mini}
      MAX_UPLOAD_FILE_BYTES: ${MAX_UPLOAD_FILE_BYTES:-10485760}
      MAX_INGEST_REQUEST_BYTES: ${MAX_INGEST_REQUEST_BYTES:-12582912}
      MAX_INGEST_JSON_BYTES: ${MAX_INGEST_JSON_BYTES:-2097152}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-["localhost","127.0.0.1"]}
      ENABLE_API_DOCS: ${ENABLE_API_DOCS:-false}
      URL_INGEST_ALLOWED_DOMAINS: ${URL_INGEST_ALLOWED_DOMAINS:-[]}
      URL_INGEST_MAX_REDIRECTS: ${URL_INGEST_MAX_REDIRECTS:-5}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000"]}
      CORS_ORIGIN_REGEX: ${CORS_ORIGIN_REGEX:-^https?://([a-zA-Z0-9.-]+|\\d{1,3}(\\.\\d{1,3}){3}):3000$}
      RUN_MIGRATIONS_ON_STARTUP: ${RUN_MIGRATIONS_ON_STARTUP:-true}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["python", "-m", "app.worker"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-mock}
      GENERATION_PROVIDER: ${GENERATION_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      GENERATION_MODEL: ${GENERATION_MODEL:-gpt-5-mini}
      MAX_UPLOAD_FILE_BYTES: ${MAX_UPLOAD_FILE_BYTES:-10485760}
      MAX_INGEST_REQUEST_BYTES: ${MAX_INGEST_REQUEST_BYTES:-12582912}
      MAX_INGEST_JSON_BYTES: ${MAX_INGEST_JSON_BYTES:-2097152}
      URL_INGEST_ALLOWED_DOMAINS: ${URL_INGEST_ALLOWED_DOMAINS:-[]}
      URL_INGEST_MAX_REDIRECTS: ${URL_INGEST_MAX_REDIRECTS:-5}
      RUN_MIGRATIONS_ON_STARTUP: ${WORKER_RUN_MIGRATIONS_ON_STARTUP:-false}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
